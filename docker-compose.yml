services:
  # Backend API - connects to external MCP server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: spectra-backend
    environment:
      # ----- v1.1 multi-tenant tunables (all optional) -----
      # Number of uvicorn workers (raise for >30 concurrent users)
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      # Per-process limits for the in-memory MCPClient cache
      SPECTRA_SESSION_TTL: ${SPECTRA_SESSION_TTL:-1800}
      SPECTRA_MAX_SESSIONS: ${SPECTRA_MAX_SESSIONS:-200}
      SPECTRA_MAX_CONCURRENT_MCP: ${SPECTRA_MAX_CONCURRENT_MCP:-50}
      # One-shot migration of v1.0 single-tenant config to the first
      # browser that loads. Set to 0 to disable on hardened deployments.
      SPECTRA_LEGACY_BOOTSTRAP: ${SPECTRA_LEGACY_BOOTSTRAP:-1}
    volumes:
      # OPTIONAL in v1.1 — kept only so legacy bootstrap can find any
      # pre-v1.1 settings.json / destinations.json / investigations.json
      # files. Safe to remove on a fresh install.
      - spectra-config:/app/config
      # Docker socket for container logs access (troubleshooting)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # NOTE on DNS: we deliberately do NOT override the `dns:` list here so
    # that Docker's embedded resolver (which also handles OrbStack's
    # `.orb.local` hostnames and Docker service discovery) keeps working.
    # If your environment has no upstream resolver at all and you see
    # "[Errno -5] No address associated with hostname" for PUBLIC hostnames
    # like api.openai.com, uncomment the block below to hard-code public
    # resolvers — but be aware this will break resolution of any LAN-only
    # names (including `.orb.local`, OpenShift service names, etc.):
    #
    # dns:
    #   - 1.1.1.1
    #   - 8.8.8.8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - spectra-network

  # Frontend (nginx serving React app)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: spectra-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spectra-network

volumes:
  spectra-config:
    name: spectra-config

networks:
  spectra-network:
    name: spectra-network
    driver: bridge
